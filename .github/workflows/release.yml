name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/parties-server

jobs:
  # ── Windows retail build ────────────────────────────────────────────────────
  windows:
    runs-on: windows-latest
    env:
      VCPKG_BINARY_SOURCES: "clear;nuget,https://nuget.pkg.github.com/emcifuntik/index.json,readwrite"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure vcpkg NuGet binary caching
        shell: pwsh
        run: |
          &(vcpkg fetch nuget | Select-Object -Last 1) sources add `
            -Source "https://nuget.pkg.github.com/emcifuntik/index.json" `
            -StorePasswordInClearText -Name GitHubPackages `
            -UserName "emcifuntik" -Password "${{ secrets.GITHUB_TOKEN }}"
          &(vcpkg fetch nuget | Select-Object -Last 1) setapikey `
            "${{ secrets.GITHUB_TOKEN }}" `
            -Source "https://nuget.pkg.github.com/emcifuntik/index.json"

      - name: Install LLVM 22
        run: |
          choco install llvm --version=22.1.0 -y
          echo "LLVMInstallDir=C:\Program Files\LLVM" >> $env:GITHUB_ENV
          echo "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install Ninja
        run: choco install ninja -y

      - name: Configure retail build
        run: |
          cmake --preset retail `
            -DENABLE_SENTRY=ON `
            -DSENTRY_DSN_CLIENT="${{ secrets.SENTRY_DSN_WINDOWS }}" `
            -DSENTRY_DSN_SERVER="${{ secrets.SENTRY_DSN_SERVER }}"

      - name: Build
        run: cmake --build --preset retail

      - name: Upload client debug symbols to Sentry
        run: |
          npx -y @sentry/cli debug-files upload `
            --org ${{ secrets.SENTRY_ORG }} `
            --project ${{ secrets.SENTRY_PROJECT_WINDOWS }} `
            build-retail/client/
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Upload server debug symbols to Sentry
        run: |
          npx -y @sentry/cli debug-files upload `
            --org ${{ secrets.SENTRY_ORG }} `
            --project ${{ secrets.SENTRY_PROJECT_SERVER }} `
            build-retail/server/
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Sign executables
        shell: bash
        run: |
          for exe in build-retail/client/parties_client.exe build-retail/server/parties_server.exe; do
            echo "Signing $exe..."
            curl -sf -X POST \
              -H "X-Sign-Token: ${{ secrets.HOME_CODE_SIGN_TOKEN }}" \
              -H "CF-Access-Client-Id: ${{ secrets.HOME_CF_ACCESS_CLIENT_ID }}" \
              -H "CF-Access-Client-Secret: ${{ secrets.HOME_CF_ACCESS_CLIENT_SECRET }}" \
              --data-binary @"$exe" \
              -o "${exe}.signed" \
              "${{ secrets.HOME_CODE_SIGN_URL }}"
            mv "${exe}.signed" "$exe"
            echo "Signed $exe"
          done

      - name: Verify signatures
        shell: pwsh
        run: |
          foreach ($exe in @(
            "build-retail/client/parties_client.exe",
            "build-retail/server/parties_server.exe"
          )) {
            $sig = Get-AuthenticodeSignature $exe
            if ($sig.Status -ne "Valid") {
              throw "Signature verification failed for $exe`: $($sig.Status)"
            }
            Write-Host "Verified $exe`: $($sig.SignerCertificate.Subject)"
          }

      - name: Collect PDB files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path pdb-staging
          Get-ChildItem -Recurse -Path build-retail -Filter "*.pdb" | ForEach-Object {
            Write-Host "Found PDB: $($_.FullName)"
            Copy-Item $_.FullName -Destination pdb-staging/
          }
          Write-Host "Total PDBs: $((Get-ChildItem pdb-staging).Count)"

      - name: Upload Windows client artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-windows-client
          path: build-retail/client/parties_client.exe

      - name: Upload Windows server artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-windows-server
          path: build-retail/server/parties_server.exe

      - name: Upload Windows PDB artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-windows-pdb
          path: pdb-staging/

  # ── macOS retail build ──────────────────────────────────────────────────────
  macos:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache vcpkg binary packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/vcpkg/archives
          key: vcpkg-macos-retail-${{ hashFiles('vcpkg.json', 'vendor/ports/**') }}
          restore-keys: vcpkg-macos-retail-

      - name: Install Ninja
        run: brew install ninja

      - name: Configure retail build
        run: |
          cmake --preset macos-arm64-release \
            -DBUILD_IN_RETAIL=ON \
            -DENABLE_SENTRY=ON \
            -DSENTRY_DSN_CLIENT="${{ secrets.SENTRY_DSN_MACOS }}"

      - name: Build
        run: cmake --build --preset macos-arm64-release

      - name: Generate dSYM bundles
        run: dsymutil build-macos-release/client/parties_client.app/Contents/MacOS/parties_client

      - name: Upload client debug symbols to Sentry
        run: |
          npx -y @sentry/cli debug-files upload \
            --org ${{ secrets.SENTRY_ORG }} \
            --project ${{ secrets.SENTRY_PROJECT_MACOS }} \
            build-macos-release/client/
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Prepare app bundle for distribution
        run: |
          rm -rf build-macos-release/client/parties_client.app/Contents/MacOS/*.dSYM
          mv build-macos-release/client/parties_client.app build-macos-release/client/Parties.app

      # ── Code signing ──────────────────────────────────────────────────────
      - name: Import code signing certificate
        env:
          P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          P12_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          echo "$P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/cert.p12" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Code sign app bundle
        run: |
          APP="build-macos-release/client/Parties.app"

          # Find the Developer ID Application identity from the imported certificate
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "Signing with: $IDENTITY"

          SPARKLE="$APP/Contents/Frameworks/Sparkle.framework"

          # Sign Sparkle internals inside-out: XPC services, Updater.app, helper, then framework
          codesign --force --options runtime --sign "$IDENTITY" \
            "$SPARKLE/Versions/B/XPCServices/Downloader.xpc"
          codesign --force --options runtime --sign "$IDENTITY" \
            "$SPARKLE/Versions/B/XPCServices/Installer.xpc"
          codesign --force --options runtime --sign "$IDENTITY" \
            "$SPARKLE/Versions/B/Updater.app"
          codesign --force --options runtime --sign "$IDENTITY" \
            "$SPARKLE/Versions/B/Autoupdate"
          codesign --force --options runtime --sign "$IDENTITY" \
            "$SPARKLE/Versions/B"

          # Sign the main app bundle
          codesign --force --options runtime \
            --entitlements client/res/Parties.entitlements \
            --sign "$IDENTITY" \
            "$APP"

          codesign --verify --deep --strict "$APP"

      # ── DMG creation ──────────────────────────────────────────────────────
      - name: Create DMG
        run: |
          npx --yes create-dmg \
            --overwrite \
            "build-macos-release/client/Parties.app" \
            build-macos-release/ || true
          # create-dmg names the file automatically; rename to our convention
          mv build-macos-release/*.dmg "parties-client-macos-${{ github.ref_name }}.dmg"

      # ── Notarization ──────────────────────────────────────────────────────
      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.MACOS_APPLE_ID }}
          APP_PASSWORD: ${{ secrets.MACOS_APP_PASSWORD }}
          TEAM_ID: ${{ secrets.MACOS_TEAM_ID }}
        run: |
          xcrun notarytool submit "parties-client-macos-${{ github.ref_name }}.dmg" \
            --apple-id "$APPLE_ID" \
            --password "$APP_PASSWORD" \
            --team-id "$TEAM_ID" \
            --wait
          xcrun stapler staple "parties-client-macos-${{ github.ref_name }}.dmg"

      # ── Sparkle update signature ──────────────────────────────────────────
      - name: Sign update for Sparkle
        env:
          SPARKLE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          SIGN_TOOL="build-macos-release/_deps/sparkle-src/bin/sign_update"
          if [ ! -f "$SIGN_TOOL" ]; then
            # SUPublicEDKey is set in Info.plist, so Sparkle silently rejects any
            # update lacking a valid EdDSA signature. A release without one is
            # unusable — fail loudly instead of shipping a dead updater.
            echo "::error::Sparkle sign_update tool not found at $SIGN_TOOL"
            exit 1
          fi
          # -p prints ONLY the bare base64 signature. WITHOUT it, sign_update emits
          # the full fragment  sparkle:edSignature="..." length="..."  which, when
          # re-wrapped as sparkle:edSignature="$SIGNATURE" in the appcast, produces a
          # nested-attribute, non-well-formed XML feed that Sparkle cannot parse.
          SIGNATURE=$("$SIGN_TOOL" -p "parties-client-macos-${{ github.ref_name }}.dmg" --ed-key-file <(echo "$SPARKLE_KEY"))
          # Defend against a future regression: a bare base64 signature never
          # contains a quote, a space, or the literal "sparkle:".
          case "$SIGNATURE" in
            "")
              echo "::error::sign_update produced an empty signature"; exit 1 ;;
            *'"'* | *'sparkle:'* | *' '*)
              echo "::error::sign_update returned an attribute fragment, not a bare signature (missing -p?): $SIGNATURE"
              exit 1 ;;
          esac
          echo "SPARKLE_SIG=$SIGNATURE" >> "$GITHUB_ENV"

      - name: Generate appcast.xml
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DMG_NAME="parties-client-macos-${GITHUB_REF_NAME}.dmg"
          DMG_SIZE=$(stat -f%z "$DMG_NAME")
          DMG_URL="https://github.com/emcifuntik/parties/releases/download/${GITHUB_REF_NAME}/${DMG_NAME}"

          cat > appcast.xml << 'APPCAST_HEADER'
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">
            <channel>
              <title>Parties Updates</title>
          APPCAST_HEADER

          cat >> appcast.xml << APPCAST_ITEM
              <item>
                <title>Version ${VERSION}</title>
                <pubDate>$(date -R)</pubDate>
                <sparkle:version>${VERSION}</sparkle:version>
                <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                <sparkle:minimumSystemVersion>13.0</sparkle:minimumSystemVersion>
                <enclosure
                  url="${DMG_URL}"
                  length="${DMG_SIZE}"
                  type="application/octet-stream"
                  sparkle:edSignature="${SPARKLE_SIG}" />
              </item>
          APPCAST_ITEM

          cat >> appcast.xml << 'APPCAST_FOOTER'
            </channel>
          </rss>
          APPCAST_FOOTER

          # Strip leading whitespace from heredoc indentation
          sed -i '' 's/^          //' appcast.xml

          # Fail the release if the feed is not well-formed XML — catches any
          # future signature/quoting regression before it ever reaches users.
          xmllint --noout appcast.xml
          echo "── appcast.xml ──"
          cat appcast.xml

      # End-to-end guard: prove the signature embedded in the appcast actually
      # validates against the SUPublicEDKey shipped inside the app bundle, over
      # the real DMG bytes. If the SPARKLE_ED_PRIVATE_KEY secret does not match
      # the app's public key, Sparkle silently rejects every update as
      # "improperly signed" at the very end of the flow — this catches it in CI.
      - name: Verify appcast signature matches the app's public key
        run: |
          set -euo pipefail
          # The runner's Homebrew Python is PEP 668 "externally managed", so a
          # plain `pip install` is refused. Install into a throwaway venv instead.
          python3 -m venv /tmp/sparkle-verify
          /tmp/sparkle-verify/bin/pip install --quiet --disable-pip-version-check pynacl
          DMG="parties-client-macos-${{ github.ref_name }}.dmg" \
          PLIST="build-macos-release/client/Parties.app/Contents/Info.plist" \
          /tmp/sparkle-verify/bin/python - <<'PY'
          import base64, glob, os, plistlib, re, sys
          info = plistlib.load(open(os.environ["PLIST"], "rb"))
          pub = info["SUPublicEDKey"].strip()
          xml = open("appcast.xml").read()
          m = re.search(r'sparkle:edSignature="([^"]+)"', xml)
          if not m:
              sys.exit("::error::no sparkle:edSignature found in appcast.xml")
          sig_b64 = m.group(1)
          try:
              sig = base64.b64decode(sig_b64, validate=True)
          except Exception:
              sys.exit(f'::error::edSignature is not valid base64: {sig_b64!r}')
          if len(sig) != 64:
              sys.exit(f"::error::edSignature is {len(sig)} bytes, expected 64 (Ed25519)")
          from nacl.signing import VerifyKey
          from nacl.exceptions import BadSignatureError
          try:
              VerifyKey(base64.b64decode(pub)).verify(open(os.environ["DMG"], "rb").read(), sig)
          except BadSignatureError:
              sys.exit(f"::error::appcast signature does NOT validate against SUPublicEDKey ({pub}). "
                       f"The SPARKLE_ED_PRIVATE_KEY secret does not match the app's public key.")
          print(f"OK: appcast signature validates against SUPublicEDKey ({pub})")
          PY

      - name: Clean up keychain
        if: always()
        run: security delete-keychain "$KEYCHAIN_PATH" || true

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-macos-dmg
          path: parties-client-macos-${{ github.ref_name }}.dmg

      - name: Upload appcast artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-appcast
          path: appcast.xml

  # ── Linux Docker image ─────────────────────────────────────────────────────
  linux-docker:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          build-args: |
            SENTRY_DSN_SERVER=${{ secrets.SENTRY_DSN_SERVER }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Extract server binary for symbol upload
        run: |
          id=$(docker create ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }})
          docker cp "$id:/usr/local/bin/parties_server" ./parties_server
          docker rm "$id"

      - name: Upload server debug symbols to Sentry
        run: |
          npx -y @sentry/cli debug-files upload \
            --org ${{ secrets.SENTRY_ORG }} \
            --project ${{ secrets.SENTRY_PROJECT_SERVER }} \
            ./parties_server
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Push Docker image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  # ── GitHub Release ──────────────────────────────────────────────────────────
  create-release:
    needs: [windows, macos, linux-docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows client
        uses: actions/download-artifact@v7
        with:
          name: release-windows-client
          path: dist/windows-client

      - name: Download Windows server
        uses: actions/download-artifact@v7
        with:
          name: release-windows-server
          path: dist/windows-server

      - name: Download Windows PDB
        uses: actions/download-artifact@v7
        with:
          name: release-windows-pdb
          path: dist/windows-pdb

      - name: Download macOS DMG
        uses: actions/download-artifact@v7
        with:
          name: release-macos-dmg
          path: dist/macos

      - name: Download appcast
        uses: actions/download-artifact@v7
        with:
          name: release-appcast
          path: dist/appcast

      - name: Package release archives
        run: |
          cd dist/windows-client && zip -r ../../parties-client-windows-${{ github.ref_name }}.zip . && cd ../..
          cd dist/windows-server && zip -r ../../parties-server-windows-${{ github.ref_name }}.zip . && cd ../..
          cd dist/windows-pdb && zip -r ../../parties-pdb-windows-${{ github.ref_name }}.zip . && cd ../..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            parties-client-windows-${{ github.ref_name }}.zip
            parties-server-windows-${{ github.ref_name }}.zip
            parties-pdb-windows-${{ github.ref_name }}.zip
            dist/macos/parties-client-macos-${{ github.ref_name }}.dmg
            dist/appcast/appcast.xml
